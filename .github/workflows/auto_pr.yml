name: Auto-create PR for claude/* branches

on:
  push:
    branches:
      - "claude/**"

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping."
            exit 0
          fi
          # Build title from latest commit message (first line)
          TITLE=$(git log -1 --pretty=%s)
          # Build body from all commits on this branch not in main
          BODY=$(git log origin/main..HEAD --pretty="- %s" | head -30)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$(printf '%s\n\n---\n*Auto-opened by GitHub Actions on push to \`%s\`*' "$BODY" "$BRANCH")"

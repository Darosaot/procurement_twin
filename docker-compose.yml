# Procurement Digital Twin — Docker Compose
# ─────────────────────────────────────────
# Quick start:
#   cp .env.example .env   # fill in JUPYTER_TOKEN (required)
#   docker compose up
#
# Services
#   twin     → Plotly Dash dashboard   http://localhost:8050
#   api      → FastAPI REST API        http://localhost:8000
#                Swagger UI            http://localhost:8000/docs
#                Prometheus metrics    http://localhost:8000/metrics
#   jupyter  → Jupyter Notebook        http://localhost:8888

services:
  twin:
    build: .
    container_name: procurement-twin
    ports:
      - "8050:8050"
    volumes:
      - "./Procurement data:/app/Procurement data:ro"
      - "feat_cache:/app/data"       # persist lazy-loaded feature store
    environment:
      - PYTHONUNBUFFERED=1
      - FEAT_DIR=/app/data/features
      - MODEL_DIR=/app/models
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  api:
    build: .
    container_name: procurement-api
    command: python run_api.py --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    volumes:
      - "./Procurement data:/app/Procurement data:ro"
      - "api_data:/app/data"         # persist simulation history DB
    environment:
      - PYTHONUNBUFFERED=1
      - FEAT_DIR=/app/data/features
      - MODEL_DIR=/app/models
      - HISTORY_DB_PATH=/app/data/history.db
      - POLICY_WORKERS=2
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  jupyter:
    build: .
    container_name: procurement-jupyter
    command: >
      jupyter notebook
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --ServerApp.token=${JUPYTER_TOKEN:?JUPYTER_TOKEN env var must be set — use: openssl rand -hex 32}
        --ServerApp.root_dir=/app/notebooks
    ports:
      - "8888:8888"
    volumes:
      - "./notebooks:/app/notebooks"
      - "./Procurement data:/app/Procurement data:ro"
    environment:
      - PYTHONUNBUFFERED=1
      - TWIN_API_BASE=http://api:8000
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8888')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  feat_cache:   # shared feature store cache
  api_data:     # API history database
